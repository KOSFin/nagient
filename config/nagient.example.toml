[updates]
channel = "stable"
# Set the public URL that serves channels/ and manifests/.
# Example:
# base_url = "https://updates.your-domain.tld"
base_url = ""

[runtime]
heartbeat_interval_seconds = 30
safe_mode = true

[docker]
project_name = "nagient"

[paths]
secrets_file = "/var/lib/nagient/secrets.env"
tool_secrets_file = "/var/lib/nagient/tool-secrets.env"
prompts_dir = "/var/lib/nagient/prompts"
plugins_dir = "/var/lib/nagient/plugins"
tools_dir = "/var/lib/nagient/tools"
providers_dir = "/var/lib/nagient/providers"
credentials_dir = "/var/lib/nagient/credentials"

[workspace]
root = ""
mode = "bounded"

[agent]
default_provider = ""
require_provider = false
system_prompt_file = "/var/lib/nagient/prompts/system.md"
max_turns = 4

[agent.memory]
hard_message_limit = 100
dynamic_focus_enabled = true
dynamic_focus_messages = 10
summary_trigger_messages = 20
retrieval_max_results = 8

[agent.logging]
level = "info"
json_logs = false
log_events = true

[transports.console]
plugin = "builtin.console"
enabled = true

[transports.webhook]
plugin = "builtin.webhook"
enabled = false
listen_host = "0.0.0.0"
listen_port = 8080
path = "/events"
shared_secret_name = "NAGIENT_WEBHOOK_SHARED_SECRET"

[transports.telegram]
plugin = "builtin.telegram"
enabled = false
bot_token_secret = "TELEGRAM_BOT_TOKEN"
default_chat_id = ""

[providers.openai]
plugin = "builtin.openai"
enabled = false
auth = "api_key"
api_key_secret = "OPENAI_API_KEY"
model = "gpt-4.1-mini"

[providers.openai-codex]
plugin = "builtin.openai_codex"
enabled = false
auth = "oauth_browser"
redirect_uri = "http://127.0.0.1:1455/auth/callback"
api_key_secret = "CODEX_API_KEY"
model = "gpt-5-codex"

[providers.anthropic]
plugin = "builtin.anthropic"
enabled = false
auth = "api_key"
api_key_secret = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-5"

[providers.gemini]
plugin = "builtin.gemini"
enabled = false
auth = "api_key"
api_key_secret = "GEMINI_API_KEY"
model = "gemini-2.5-pro"

[providers.deepseek]
plugin = "builtin.deepseek"
enabled = false
auth = "api_key"
api_key_secret = "DEEPSEEK_API_KEY"
model = "deepseek-chat"

[providers.ollama]
plugin = "builtin.ollama"
enabled = false
auth = "none"
base_url = "http://127.0.0.1:11434"
model = "llama3.1:8b"

[tools.workspace_fs]
plugin = "workspace.fs"
enabled = true

[tools.workspace_shell]
plugin = "workspace.shell"
enabled = true
timeout_seconds = 15
max_output_chars = 8000
default_ping_count = 4
normalize_infinite_commands = true
enforce_finite_commands = true

[tools.workspace_git]
plugin = "workspace.git"
enabled = true

[tools.transport_interaction]
plugin = "transport.interaction"
enabled = true

[tools.system_backup]
plugin = "system.backup"
enabled = true

[tools.system_reconcile]
plugin = "system.reconcile"
enabled = true

[tools.transport_router]
plugin = "transport.router"
enabled = true

[tools.agent_memory]
plugin = "agent.memory"
enabled = true

[tools.system_jobs]
plugin = "system.jobs"
enabled = true

[tools.github_api]
plugin = "github.api"
enabled = false
token_secret = "GITHUB_TOKEN"
