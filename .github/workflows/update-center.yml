name: Update Center

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONPATH: src
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      UPDATE_BASE_URL: ${{ vars.UPDATE_BASE_URL }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve centralized release settings
        id: meta
        run: python scripts/release/resolve_release_env.py --format github-output >> "$GITHUB_OUTPUT"

      - name: Assemble static update center
        id: site
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          BASE_URL="${{ steps.meta.outputs.update_base_url }}"
          SITE_PATH="${RUNNER_TEMP}/site"
          mkdir -p "${SITE_PATH}/channels" "${SITE_PATH}/manifests" "${SITE_PATH}/${VERSION}"
          python scripts/release/build_release_manifest.py \
            --version "${VERSION}" \
            --channel "${{ steps.meta.outputs.default_channel }}" \
            --base-url "${BASE_URL}" \
            --docker-image "${{ steps.meta.outputs.docker_image }}" \
            --published-at "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --summary "Repository snapshot ${VERSION}." \
            --output "${SITE_PATH}/manifests/${VERSION}.json" \
            --channel-output "${SITE_PATH}/channels/stable.json"
          python scripts/release/render_release_assets.py \
            --output-dir "${SITE_PATH}/${VERSION}" \
            --update-base-url "${BASE_URL}" \
            --docker-image "${{ steps.meta.outputs.docker_image }}" \
            --default-channel "${{ steps.meta.outputs.default_channel }}" \
            --docker-project-name "${{ steps.meta.outputs.docker_project_name }}" \
            --container-name "${{ steps.meta.outputs.container_name }}"
          python scripts/release/render_bootstrap_assets.py \
            --output-dir "${SITE_PATH}" \
            --update-base-url "${BASE_URL}"
          touch "${SITE_PATH}/.nojekyll"
          if [[ -n "${CUSTOM_DOMAIN}" ]]; then
            printf '%s\n' "${CUSTOM_DOMAIN}" > "${SITE_PATH}/CNAME"
          fi
          echo "site_path=${SITE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Publish gh-pages branch snapshot
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.site.outputs.site_path }}
          publish_branch: gh-pages
          force_orphan: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.site_path }}

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke check published bootstrap asset
        shell: bash
        run: |
          set -euo pipefail
          PAGE_URL="${{ steps.deployment.outputs.page_url }}"
          INSTALLER_URL="${PAGE_URL%/}/install.sh"
          CHANNEL_URL="${PAGE_URL%/}/channels/stable.json"
          INSTALLER_PAYLOAD="$(mktemp)"
          CHANNEL_PAYLOAD="$(mktemp)"
          trap 'rm -f "$INSTALLER_PAYLOAD" "$CHANNEL_PAYLOAD"' EXIT
          curl -fsSL "$INSTALLER_URL" >"$INSTALLER_PAYLOAD"
          curl -fsSL "$CHANNEL_URL" >"$CHANNEL_PAYLOAD"
          if grep -q "__NAGIENT_UPDATE_BASE_URL__" "$INSTALLER_PAYLOAD"; then
            echo "Rendered bootstrap installer still contains unresolved update URL placeholder." >&2
            exit 1
          fi
          python - "${{ steps.meta.outputs.version }}" "$CHANNEL_PAYLOAD" <<'PY'
          import json
          import sys

          expected_version = sys.argv[1]
          payload_path = sys.argv[2]
          with open(payload_path, "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          actual_version = payload.get("latest_version")
          if actual_version != expected_version:
              raise SystemExit(
                  f"Expected latest_version={expected_version!r}, got {actual_version!r}."
              )
          PY
