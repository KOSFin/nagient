name: Auto Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  create-version-tag:
    name: create-or-skip-version-tag
    runs-on: ubuntu-latest
    env:
      UPDATE_BASE_URL: ${{ vars.UPDATE_BASE_URL }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve version metadata
        id: meta
        run: python scripts/release/resolve_release_env.py --format github-output >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${{ steps.meta.outputs.git_tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if GitHub release already exists
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ steps.meta.outputs.git_tag }}',
              })
              core.setOutput('exists', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false')
                return
              }
              throw error
            }

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.git_tag }}" -m "Release ${{ steps.meta.outputs.git_tag }}"
          git push origin "${{ steps.meta.outputs.git_tag }}"

      - name: Dispatch release workflow when release is missing
        if: steps.release.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ steps.meta.outputs.git_tag }}',
            })

      - name: Publish workflow summary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.release.outputs.exists }}" == "true" ]]; then
            {
              echo "## Release dispatch skipped"
              echo
              echo "GitHub release for \`${{ steps.meta.outputs.git_tag }}\` already exists."
              echo
              echo "To produce a new release, bump \`src/nagient/version.py\` and push to \`main\`."
              echo "If you need to rebuild the existing release manually, start \`Release\` from the Actions tab."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.tag.outputs.exists }}" == "true" ]]; then
            {
              echo "## Release redispatched"
              echo
              echo "Tag \`${{ steps.meta.outputs.git_tag }}\` already exists, but the GitHub release does not."
              echo "Dispatched \`release.yml\` again for the existing tag."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Release dispatched"
              echo
              echo "Created tag \`${{ steps.meta.outputs.git_tag }}\` and dispatched \`release.yml\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
