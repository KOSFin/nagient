name: Auto Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: true

jobs:
  create-version-tag:
    name: create-or-skip-version-tag
    runs-on: ubuntu-latest
    env:
      UPDATE_BASE_URL: ${{ vars.UPDATE_BASE_URL }}
      CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
      DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure this run targets current main
        id: freshness
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          HEAD_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "main_sha=${MAIN_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${HEAD_SHA}" == "${MAIN_SHA}" ]]; then
            echo "is_current_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_current_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version metadata
        id: meta
        if: steps.freshness.outputs.is_current_main == 'true'
        run: python scripts/release/resolve_release_env.py --format github-output >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        if: steps.freshness.outputs.is_current_main == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${{ steps.meta.outputs.git_tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            TAG_SHA="$(git rev-list -n 1 "refs/tags/${{ steps.meta.outputs.git_tag }}")"
            echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"
            if [[ "${TAG_SHA}" == "${{ steps.freshness.outputs.head_sha }}" ]]; then
              echo "matches_head=true" >> "$GITHUB_OUTPUT"
            else
              echo "matches_head=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "tag_sha=" >> "$GITHUB_OUTPUT"
            echo "matches_head=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if GitHub release already exists
        id: release
        if: steps.freshness.outputs.is_current_main == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: '${{ steps.meta.outputs.git_tag }}',
              })
              core.setOutput('exists', 'true')
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false')
                return
              }
              throw error
            }

      - name: Create or retarget tag when release is missing
        if: steps.freshness.outputs.is_current_main == 'true' && steps.release.outputs.exists == 'false' && (steps.tag.outputs.exists == 'false' || steps.tag.outputs.matches_head == 'false')
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f -a "${{ steps.meta.outputs.git_tag }}" -m "Release ${{ steps.meta.outputs.git_tag }}"
          git push origin "+refs/tags/${{ steps.meta.outputs.git_tag }}:refs/tags/${{ steps.meta.outputs.git_tag }}"

      - name: Dispatch release workflow when release is missing
        if: steps.freshness.outputs.is_current_main == 'true' && steps.release.outputs.exists == 'false' && steps.tag.outputs.exists == 'true' && steps.tag.outputs.matches_head == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ steps.meta.outputs.git_tag }}',
            })

      - name: Publish workflow summary
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.freshness.outputs.is_current_main }}" != "true" ]]; then
            {
              echo "## Auto Tag skipped"
              echo
              echo "This run is stale or was started from a non-current ref."
              echo "Run commit: \`${{ steps.freshness.outputs.head_sha }}\`."
              echo "Current \`main\`: \`${{ steps.freshness.outputs.main_sha }}\`."
              echo
              echo "Skipping to avoid creating or retargeting tags for old commits."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.release.outputs.exists }}" == "true" ]]; then
            {
              echo "## Release dispatch skipped"
              echo
              echo "GitHub release for \`${{ steps.meta.outputs.git_tag }}\` already exists."
              echo
              echo "To produce a new release, bump \`src/nagient/version.py\` and push to \`main\`."
              echo "If you need to rebuild the existing release manually, start \`Release\` from the Actions tab."
            } >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ steps.tag.outputs.exists }}" == "true" ]]; then
            if [[ "${{ steps.tag.outputs.matches_head }}" == "true" ]]; then
              {
                echo "## Release redispatched"
                echo
                echo "Tag \`${{ steps.meta.outputs.git_tag }}\` already exists on the current commit, but the GitHub release does not."
                echo "Dispatched \`release.yml\` again for the existing tag."
              } >> "$GITHUB_STEP_SUMMARY"
            else
              {
                echo "## Tag retargeted"
                echo
                echo "Tag \`${{ steps.meta.outputs.git_tag }}\` existed without a GitHub release and pointed to \`${{ steps.tag.outputs.tag_sha }}\`."
                echo "Moved the tag to current commit \`${{ steps.freshness.outputs.head_sha }}\`."
                echo "The tag push will trigger \`release.yml\` for the corrected commit."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            {
              echo "## Tag created"
              echo
              echo "Created tag \`${{ steps.meta.outputs.git_tag }}\`."
              echo "The tag push will trigger \`release.yml\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
