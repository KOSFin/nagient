name: ${NAGIENT_DOCKER_PROJECT_NAME:-__NAGIENT_DOCKER_PROJECT_NAME__}

services:
  nagient:
    image: ${NAGIENT_IMAGE:-__NAGIENT_DOCKER_IMAGE__}
    container_name: ${NAGIENT_CONTAINER_NAME:-__NAGIENT_CONTAINER_NAME__}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NAGIENT_HOME: /var/lib/nagient
      NAGIENT_CONFIG: /var/lib/nagient/config/config.toml
      NAGIENT_STATE_DIR: /var/lib/nagient/state
      NAGIENT_LOG_DIR: /var/lib/nagient/logs
      NAGIENT_RELEASES_DIR: /var/lib/nagient/releases
      NAGIENT_CHANNEL: ${NAGIENT_CHANNEL:-__NAGIENT_DEFAULT_CHANNEL__}
      NAGIENT_UPDATE_BASE_URL: ${NAGIENT_UPDATE_BASE_URL:-__NAGIENT_UPDATE_BASE_URL__}
      NAGIENT_HEARTBEAT_INTERVAL: ${NAGIENT_HEARTBEAT_INTERVAL:-30}
      NAGIENT_DOCKER_PROJECT_NAME: ${NAGIENT_DOCKER_PROJECT_NAME:-__NAGIENT_DOCKER_PROJECT_NAME__}
    volumes:
      - ./runtime:/var/lib/nagient
      - ./config.toml:/var/lib/nagient/config/config.toml:ro
    healthcheck:
      test: ["CMD", "python", "-m", "nagient", "doctor", "--format", "json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
