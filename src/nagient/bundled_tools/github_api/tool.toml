id = "github.api"
type = "tool"
version = "0.1.0"
display_name = "GitHub API"
namespace = "github.api"
runtime = "python"
entrypoint = "tool.py"
capabilities = ["github"]
optional_config = ["token_secret", "base_url", "timeout_seconds"]

[[config_fields]]
key = "token_secret"
label = "GitHub token"
help_text = "Tool secret name that stores a GitHub personal access token or GitHub App installation token."
value_type = "secret"
category = "connection"
secret = true

[[config_fields]]
key = "base_url"
label = "GitHub API URL"
help_text = "GitHub API base URL. Use https://api.github.com for GitHub.com or your /api/v3 URL for GitHub Enterprise."
value_type = "string"
category = "connection"

[[config_fields]]
key = "timeout_seconds"
label = "Request timeout"
help_text = "HTTP timeout for GitHub API requests."
value_type = "integer"
category = "advanced"

[[functions]]
name = "github.api.get_repository"
binding = "get_repository"
description = "Fetch repository metadata from the GitHub API."
permissions = ["github.read"]
secret_bindings = ["token_secret"]
input_schema = { type = "object" }
output_schema = { type = "object" }

[[functions]]
name = "github.api.list_issues"
binding = "list_issues"
description = "List repository issues through the GitHub API."
permissions = ["github.read"]
secret_bindings = ["token_secret"]
input_schema = { type = "object" }
output_schema = { type = "object" }

[[functions]]
name = "github.api.create_issue"
binding = "create_issue"
description = "Create a repository issue through the GitHub API."
permissions = ["github.write"]
secret_bindings = ["token_secret"]
side_effect = "external"
approval_policy = "required"
dry_run_supported = true
input_schema = { type = "object" }
output_schema = { type = "object" }

[[functions]]
name = "github.api.add_issue_comment"
binding = "add_issue_comment"
description = "Add a comment to a repository issue through the GitHub API."
permissions = ["github.write"]
secret_bindings = ["token_secret"]
side_effect = "external"
approval_policy = "required"
dry_run_supported = true
input_schema = { type = "object" }
output_schema = { type = "object" }

[[functions]]
name = "github.api.request"
binding = "request"
description = "Send a structured request to the configured GitHub API."
permissions = ["github.read", "github.write"]
secret_bindings = ["token_secret"]
side_effect = "external"
approval_policy = "policy"
dry_run_supported = true
input_schema = { type = "object" }
output_schema = { type = "object" }
